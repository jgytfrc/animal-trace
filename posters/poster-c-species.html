<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Poster C - 16 Species</title>
<style>
:root{--bg:#f5f3ef;--text:#2a2520;--accent:#b8753e;--green:#5a7a4e}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Serif SC','Source Han Serif SC','STSong','SimSun',serif;background:#1a1a1a;color:var(--text);display:flex;justify-content:center;align-items:center;min-height:100vh}
.poster{width:800px;height:800px;background:var(--bg);position:relative;overflow:hidden;box-shadow:0 4px 40px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center}
/* Concentric rings */
.rings{position:absolute;inset:0;pointer-events:none;z-index:0}
.ring{position:absolute;border-radius:50%;border:1px solid rgba(0,0,0,.04);left:50%;top:50%;transform:translate(-50%,-50%)}
.ring-1{width:680px;height:680px;border-style:dashed;border-color:rgba(0,0,0,.06)}
.ring-2{width:520px;height:520px;border-color:rgba(184,117,62,.08)}
.ring-3{width:340px;height:340px;border-color:rgba(184,117,62,.12)}
.ring-4{width:200px;height:200px;border-color:rgba(184,117,62,.15)}
/* Species circle */
.species-ring{position:absolute;inset:0;pointer-events:none;z-index:2}
.species-item{position:absolute;display:flex;flex-direction:column;align-items:center;gap:4px}
.species-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.4)}
.species-name{font-size:9px;opacity:.45;letter-spacing:.04em;white-space:nowrap;text-align:center}
.species-product{font-size:7px;opacity:.25;font-family:'Courier New',monospace;letter-spacing:.05em;white-space:nowrap}
.iucn{font-size:6px;opacity:.3;font-family:'Courier New',monospace;padding:1px 5px;border-radius:8px}
.iucn.cr{background:rgba(200,50,50,.08);color:#c83232}
.iucn.en{background:rgba(200,120,50,.08);color:#c87832}
.iucn.vu{background:rgba(200,160,50,.08);color:#c8a032}
.iucn.nt{background:rgba(150,150,50,.08);color:#969632}
.iucn.lc{background:rgba(100,150,100,.08);color:#5a7a4e}
/* Center */
.center-text{position:relative;z-index:3;text-align:center;pointer-events:none;max-width:240px}
.center-text .line1{font-size:16px;font-weight:300;letter-spacing:.08em;opacity:.6;line-height:1.8}
.center-text .line2{font-size:16px;font-weight:300;letter-spacing:.08em;opacity:.6;line-height:1.8}
.center-text .accent{color:var(--accent);opacity:.8}
.center-text .title{font-size:10px;letter-spacing:.2em;opacity:.3;font-family:'Courier New',monospace;margin-top:12px}
/* HUD data */
.hud-data{position:absolute;font-family:'Courier New',monospace;font-size:7px;color:var(--accent);opacity:.25;pointer-events:none;z-index:3;letter-spacing:.05em}
.hud-data.tl{top:28px;left:28px}.hud-data.tr{top:28px;right:28px}.hud-data.bl{bottom:28px;left:28px}.hud-data.br{bottom:28px;right:28px}
/* Corner marks */
.corner{position:absolute;width:40px;height:40px;pointer-events:none;z-index:3;opacity:.3}
.corner::before,.corner::after{content:'';position:absolute;background:var(--accent)}
.corner-tl{top:20px;left:20px}.corner-tl::before{top:0;left:0;width:28px;height:1px}.corner-tl::after{top:0;left:0;width:1px;height:28px}
.corner-tr{top:20px;right:20px}.corner-tr::before{top:0;right:0;width:28px;height:1px}.corner-tr::after{top:0;right:0;width:1px;height:28px}
.corner-bl{bottom:20px;left:20px}.corner-bl::before{bottom:0;left:0;width:28px;height:1px}.corner-bl::after{bottom:0;left:0;width:1px;height:28px}
.corner-br{bottom:20px;right:20px}.corner-br::before{bottom:0;right:0;width:28px;height:1px}.corner-br::after{bottom:0;right:0;width:1px;height:28px}
/* Outer ring data labels */
.data-label{position:absolute;font-family:'Courier New',monospace;font-size:6px;opacity:.2;pointer-events:none;z-index:1;letter-spacing:.08em;color:var(--accent)}
/* Scanlines */
.scanlines{position:absolute;inset:0;pointer-events:none;z-index:99;opacity:.03;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.5) 2px,rgba(0,0,0,.5) 4px)}
</style>
</head>
<body>
<div class="poster" id="poster">
  <div class="scanlines"></div>
  <div class="rings"><div class="ring ring-1"></div><div class="ring ring-2"></div><div class="ring ring-3"></div><div class="ring ring-4"></div></div>
  <div class="corner corner-tl"></div><div class="corner corner-tr"></div><div class="corner corner-bl"></div><div class="corner corner-br"></div>
  <div class="hud-data tl">SYS::ARCHIVE_v2.0</div>
  <div class="hud-data tr">SPECIES_INDEX::16</div>
  <div class="hud-data bl">CITES · IUCN · TRAFFIC</div>
  <div class="hud-data br">[ONLINE]</div>
  <div class="data-label" style="top:6px;left:50%;transform:translateX(-50%)">● DATA RING v2.0 ●</div>

  <!-- Center text -->
  <div class="center-text">
    <p class="line1">十万年前<br><span class="accent">那是生存</span></p>
    <p class="line2" style="margin-top:8px">今天<br><span class="accent">这是掠夺</span></p>
    <div class="title">── ANIMAL TRACE ──</div>
  </div>

  <!-- 16 Species positioned in a circle -->
  <div class="species-ring" id="speciesRing"></div>
</div>

<script>
const animals = [
  {emoji:'🐘',name:'非洲象',product:'象牙',iucn:'EN',cls:'en'},
  {emoji:'🦏',name:'白犀牛',product:'犀角',iucn:'NT',cls:'nt'},
  {emoji:'🐯',name:'孟加拉虎',product:'虎皮·虎骨',iucn:'EN',cls:'en'},
  {emoji:'🐢',name:'玳瑁海龟',product:'龟甲',iucn:'CR',cls:'cr'},
  {emoji:'🦌',name:'梅花鹿',product:'鹿角·兽皮',iucn:'LC',cls:'lc'},
  {emoji:'🦜',name:'金刚鹦鹉',product:'羽毛',iucn:'LC',cls:'lc'},
  {emoji:'🐊',name:'湾鳄',product:'皮革',iucn:'LC',cls:'lc'},
  {emoji:'🦎',name:'中华穿山甲',product:'鳞片',iucn:'CR',cls:'cr'},
  {emoji:'🐐',name:'藏羚羊',product:'羊绒',iucn:'NT',cls:'nt'},
  {emoji:'🐆',name:'雪豹',product:'皮毛',iucn:'VU',cls:'vu'},
  {emoji:'🦛',name:'河马',product:'牙齿',iucn:'VU',cls:'vu'},
  {emoji:'🐍',name:'蛇',product:'蛇皮',iucn:'LC',cls:'lc'},
  {emoji:'🐻',name:'棕熊',product:'熊胆·皮毛',iucn:'LC',cls:'lc'},
  {emoji:'🦊',name:'狐狸',product:'皮毛',iucn:'LC',cls:'lc'},
  {emoji:'🐋',name:'鲸鱼',product:'鲸脂·龙涎香',iucn:'LC',cls:'lc'},
  {emoji:'🐦',name:'鸵鸟',product:'羽毛·皮革',iucn:'LC',cls:'lc'},
];

const ring = document.getElementById('speciesRing');
const cx = 400, cy = 400, r = 290;
const startAngle = -Math.PI / 2; // start from top

animals.forEach((a, i) => {
  const angle = startAngle + (i / 16) * Math.PI * 2;
  const x = cx + Math.cos(angle) * r - 30;
  const y = cy + Math.sin(angle) * r - 40;

  const div = document.createElement('div');
  div.className = 'species-item';
  div.style.cssText = `left:${x}px;top:${y}px;`;

  div.innerHTML = `
    <div class="species-dot">${a.emoji}</div>
    <div class="species-name">${a.name} · ${a.product}</div>
    <div class="iucn ${a.cls}">${a.iucn}</div>
  `;
  ring.appendChild(div);
});
</script>
</body>
</html>
